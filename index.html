<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>eBay AI Profit Manager</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>
<header><h1>eBay AI Profit Manager</h1><p>URLを貼る → 相場分析 → 利益計算</p></header>
<main>
<section class="card">
<h2>eBay相場分析</h2>
<div class="row"><input id="q" placeholder="eBay URLまたは商品名"><button onclick="analyze()">分析</button></div>
<div id="summary" class="kpis"></div><div id="items"></div>
</section>
<section class="card">
<h2>利益計算</h2>
<div class="grid">
<label>おすすめ販売価格 USD<input id="sell" type="number" step="0.01"></label>
<label>仕入れ価格 円<input id="purchase" type="number" value="0"></label>
<label>送料 円<input id="shipping" type="number" value="3000"></label>
<label>手数料 %<input id="fee" type="number" value="15"></label>
<label>為替 円/USD<input id="fx" type="number" value="160"></label>
<label>目標利益 円<input id="target" type="number" value="5000"></label>
</div>
<button onclick="calc()">計算</button>
<div class="kpis">
<div><span>予想利益</span><b id="profit">¥0</b></div>
<div><span>仕入れ上限</span><b id="maxp">¥0</b></div>
<div><span>判定</span><b id="decision">未判定</b></div>
</div>
</section>
</main><script src="/static/app.js"></script>
</body></html>
